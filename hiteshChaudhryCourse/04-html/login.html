<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      .card {
        padding-top: 25vh;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      input {
        border-radius: 50px;
        padding: 10px;
        width: 400px;
      }
      button {
        border-radius: 50px;
        width: 100px;
        background-color: #0ccfe9;
      }
      form {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      button:hover {
        background-color: blue;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>login page</h2>
      <form action="">
        <input type="email" placeholder="email" />
        <input type="password" placeholder="password" />
        <button type="submit">Login</button>
      </form>
    </div>
  </body>
</html>
